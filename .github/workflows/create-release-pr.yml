name: Create Release PR

on:
  workflow_dispatch:
    inputs:
      package:
        description: Package to release
        required: true
        type: choice
        options:
          - cardano-api
          - cardano-api-gen
          - cardano-rpc
          - cardano-wasm
      version:
        description: Version to release (PVP format A.B.C.D, e.g. 10.25.0.0)
        required: true
        type: string

jobs:
  create-release-pr:
    name: Create release PR for ${{ inputs.package }}-${{ inputs.version }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version format
        run: |
          VERSION="${{ inputs.version }}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version '$VERSION' does not match PVP format A.B.C.D (e.g. 10.25.0.0)"
            exit 1
          fi
          echo "Version '$VERSION' is valid PVP format."

      - name: Install changie
        uses: miniscruff/changie-action@v2
        with:
          version: latest

      - name: Batch changelog fragments for ${{ inputs.package }} ${{ inputs.version }}
        run: |
          changie batch "${{ inputs.version }}" --project "${{ inputs.package }}"

      - name: Merge changelog into ${{ inputs.package }}/CHANGELOG.md
        run: |
          changie merge --project "${{ inputs.package }}"

      - name: Create release pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            release: ${{ inputs.package }}-${{ inputs.version }}

            Automated release PR created by the create-release-pr workflow.
          branch: release/${{ inputs.package }}-${{ inputs.version }}
          delete-branch: true
          title: "release: ${{ inputs.package }}-${{ inputs.version }}"
          body: |
            ## Release `${{ inputs.package }}` `${{ inputs.version }}`

            This PR was automatically generated by the **Create Release PR** workflow.

            It contains:
            - Updated `${{ inputs.package }}/CHANGELOG.md` with entries for this release
            - Bumped `version:` in `${{ inputs.package }}/${{ inputs.package }}.cabal`

            ### Checklist

            - [ ] The changelog entries are correct and complete
            - [ ] The cabal version is bumped to `${{ inputs.version }}`
            - [ ] The diff contains no unexpected code changes
            - [ ] A CHaP PR has been opened (see [RELEASING2.md](./RELEASING2.md))
            - [ ] The CHaP PR CI passes
            - [ ] This PR is merged **after** the CHaP PR is merged

            ### After merging

            See [RELEASING2.md](./RELEASING2.md) for tagging and GitHub release steps.
          labels: release
