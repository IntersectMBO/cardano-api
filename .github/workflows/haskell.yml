name: Haskell CI

on:
  merge_group:
  pull_request:
  push:
    # we need this to populate cache for `master` branch to make it available to the child branches, see
    # https://docs.github.com/en/actions/using-workflows/caching-dependencies-to-speed-up-workflows#restrictions-for-accessing-a-cache
    branches:
      - master
  # GH caches are removed when not accessed within 7 days - this schedule runs the job every 6 days making
  # sure that we always have some caches on master
  schedule:
    - cron: '0 0 */6 * *'

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.sys.os }}

    strategy:
      fail-fast: false
      matrix:
        ghc: [&ghc-stable "9.6", "9.10", &ghc-latest "9.12", "9.14"]
        cabal: [&cabal-version "3.16"]
        sys:
          - { os: ubuntu-latest, shell: bash }
        include:
          # Using include, to make sure there will only be one macOS job, even if the matrix gets expanded later on.
          # We want a single job, because macOS runners are scarce.
          - ghc: *ghc-stable
            cabal: *cabal-version
            sys:
              os: macos-latest
              shell: bash
          - ghc: *ghc-latest
            cabal: *cabal-version
            sys:
              os: windows-latest
              shell: 'C:/msys64/usr/bin/bash.exe -e {0}'

    defaults:
        run:
          shell: ${{ matrix.sys.shell }}

    env:
      # Modify this value to "invalidate" the cabal cache.
      CABAL_CACHE_VERSION: "2026-06-26"
      # these two are msys2 env vars, they have no effect on non-msys2 installs.
      MSYS2_PATH_TYPE: inherit
      MSYSTEM: MINGW64

    concurrency:
      group: >
        a+${{ github.event_name }}
        b+${{ github.workflow_ref }}
        c+${{ github.job }}
        d+${{ matrix.ghc }}
        e+${{ matrix.cabal }}
        f+${{ matrix.sys.os }}
        g+${{ (startsWith(github.ref, 'refs/heads/gh-readonly-queue/') && github.run_id) || github.event.pull_request.number || github.ref }}
      cancel-in-progress: true

    steps:
    - name: Concurrency group
      run: >
        echo
        a+${{ github.event_name }}
        b+${{ github.workflow_ref }}
        c+${{ github.job }}
        d+${{ matrix.ghc }}
        e+${{ matrix.cabal }}
        f+${{ matrix.sys.os }}
        g+${{ (startsWith(github.ref, 'refs/heads/gh-readonly-queue/') && github.run_id) || github.event.pull_request.number || github.ref }}

    - name: Install Haskell
      uses: input-output-hk/actions/haskell@latest
      id: setup-haskell
      with:
        ghc-version: ${{ matrix.ghc }}
        cabal-version: ${{ matrix.cabal }}

    - name: Install system dependencies
      uses: input-output-hk/actions/base@latest
      with:
        use-sodium-vrf: true # default is true

    - uses: actions/checkout@v6

    - name: Install gRPC system dependencies
      uses: input-output-hk/cardano-dev/actions/grpc-deps@grpc-deps-0.0.1.0

    - name: Cache and install Cabal dependencies
      uses: input-output-hk/cardano-dev/actions/cabal-cache@cabal-cache-0.0.1.0
      with:
        cabal-store: ${{ steps.setup-haskell.outputs.cabal-store }}
        cache-version: ${{ env.CABAL_CACHE_VERSION }}

    # Now we build.
    - name: Build all
      run: cabal build all --enable-tests

    - name: Run tests
      env:
        TMPDIR: ${{ runner.temp }}
        TMP: ${{ runner.temp }}
        KEEP_WORKSPACE: 1
      run: cabal test all --enable-tests --test-show-details=direct

    # Uncomment the following back in for debugging. Remember to launch a `pwsh` from
    # the tmux session to debug `pwsh` issues. And be reminded that the `/msys2` and
    # `/msys2/mingw64` paths are not in PATH by default for the workflow, but tmate
    # will put them in.
    # You may also want to run
    #
    #   $env:PATH=("C:\Program Files\PowerShell\7;{0}" -f $env:ORIGINAL_PATH)
    #
    # to restore the original path.  Do note that some test might need msys2
    # and will silently fail if msys2 is not in path. See the "Run tests" step.
    #
    # - name: Setup tmate session
    #   if: ${{ failure() }}
    #   uses: mxschmitt/action-tmate@v3
    #   with:
    #      limit-access-to-actor: true

  check-proto-gen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      - uses: rrbutani/use-nix-shell-action@v1

      - name: Regenerate protobuf code
        working-directory: cardano-rpc
        run: buf generate proto

      - name: Check that generated files from proto definitions are up to date
        run: |
          git add cardano-rpc/gen
          if ! git diff --staged --quiet -- cardano-rpc/gen; then
            echo "Generated files differ from repository files:"
            git diff --staged --name-status -- cardano-rpc/gen
            exit 1
          fi
          echo "All generated files match repository files"

  build-complete:
    needs: [build, check-proto-gen]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
    - name: Check if any previous job failed
      run: |
        if [[ "${{ needs.build.result }}" == "failure" || "${{ needs.check-proto-gen.result }}" == "failure" ]]; then
          # this ignores skipped dependencies
          echo 'Required jobs failed to build.'
          exit 1
        else
          echo 'Build complete'
        fi
